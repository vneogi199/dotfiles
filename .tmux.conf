unbind r
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

set -g prefix C-s

set -g mouse on
set -g default-terminal "tmux-256color"
set -g base-index 1 # start numbering at 1
set-option -g status-position top

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind q kill-window

# bind H previous-window
# bind L next-window

# bind r command-prompt "rename-window %%"
# bind ^A last-window
# bind ^W list-windows
# bind w list-windows
# bind z resize-pane -Z
# bind ^L refresh-client
# bind l refresh-client
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
# bind '"' choose-window
# bind -r -T prefix , resize-pane -L 20
# bind -r -T prefix . resize-pane -R 20
# bind -r -T prefix - resize-pane -D 7
# bind -r -T prefix = resize-pane -U 7
# bind : command-prompt
# bind * setw synchronize-panes
# bind P set pane-border-status
# bind c kill-pane
# bind x swap-pane -D
# bind S choose-session
# bind-key -T copy-mode-vi v send-keys -X begin-selection


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin configuration
set -g @catppuccin_flavor "mocha"
# set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W - #{b:pane_current_path}"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text " #W - #{b:pane_current_path}"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W - #{b:pane_current_path}"
# set -g @catppuccin_status_right_separator_inverse "no"
# set -g @catppuccin_status_fill "icon"
# set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
# set -g @catppuccin_date_time_text "%d-%m-%y %I:%M %p"

run-shell ~/.tmux/plugins/tmux/catppuccin.tmux

# set -g @catppuccin_flavor "mocha"
# run ~/.tmux/plugins/tmux/catppuccin.tmux
#
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
# set -g @catppuccin_status_right_separator_inverse "no"
# set -g @catppuccin_status_fill "icon"
# set -g @catppuccin_status_connect_separator "no"
#
# set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text " %d-%m-%y %I:%M%p"
#
# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right ""
# set -g status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
# set -ag status-right "#{E:@catppuccin_status_session}"
# set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right " #{E:@catppuccin_status_date_time}"
# set -ag status-right '#[fg=yellow]Batt: #(pmset -g batt | grep -o "[0-9]\{1,3\}%") | %a %h-%d %H:%M '


# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'
